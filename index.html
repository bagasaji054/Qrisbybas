<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pembayaran BAS STORE</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        canvas { max-width: 100%; height: auto; border-radius: 8px; margin-top: 5px; }
        .timer { background: #ce2029; padding: 12px; margin: 10px auto; border-radius: 5px; font-weight: bold; font-size: 20px; max-width: 400px; }
        .msg { font-size: 13px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="content">
        <div class="timer" id="timer">Sisa Waktu: 09:00</div>
        <canvas id="mainCanvas"></canvas>
        <p class="msg">Screenshot halaman ini untuk melakukan pembayaran</p>
    </div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const params = new URLSearchParams(window.location.search);
    const nom = params.get('nom');
    const qrBase64 = params.get('qr');

    const imgBg = new Image();
    imgBg.src = 'template.png'; // Pastikan file template.png ada di GitHub Anda

    const imgQr = new Image();

    function render() {
        canvas.width = imgBg.width;
        canvas.height = imgBg.height;
        ctx.drawImage(imgBg, 0, 0);

        if (qrBase64) {
            ctx.drawImage(imgQr, 53, 175, 560, 560); // Posisi QR di area biru
        }

        if (nom) {
            const txt = new Intl.NumberFormat('id-ID', {
                style: 'currency', currency: 'IDR'
            }).format(nom);
            ctx.font = "bold 42px Arial";
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.fillText(txt, 604, 835); // Posisi Nominal di area merah (sudah diturunkan)
        }
    }

    imgBg.onload = () => {
        if (qrBase64) {
            imgQr.src = "data:image/png;base64," + decodeURIComponent(qrBase64);
            imgQr.onload = render;
        } else {
            render();
        }
    };

    // Timer 9 Menit
    let timeLeft = 9 * 60;
    const countdown = setInterval(() => {
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById('timer').innerHTML = `Sisa Waktu: 0${m}:${s < 10 ? '0'+s : s}`;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            document.getElementById('content').innerHTML = "<h1 style='margin-top:100px;'>WAKTU HABIS</h1><p>Silakan hubungi admin untuk link baru.</p>";
        }
        timeLeft--;
    }, 1000);
</script>
</body>
</html>
