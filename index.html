<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pembayaran BAS STORE</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        canvas { max-width: 100%; height: auto; border-radius: 8px; margin-top: 5px; box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        .timer { background: #ce2029; padding: 12px; margin: 10px auto; border-radius: 5px; font-weight: bold; font-size: 20px; max-width: 400px; border: 2px solid #fff; }
        .msg { font-size: 13px; color: #aaa; margin-top: 15px; font-style: italic; }
    </style>
</head>
<body>

    <div id="content">
        <div class="timer" id="timer">Sisa Waktu: 09:00</div>
        <canvas id="mainCanvas"></canvas>
        <p class="msg">Silakan Screenshot halaman ini untuk membayar</p>
    </div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const params = new URLSearchParams(window.location.search);
    const nom = params.get('nom');
    const qrBase64 = params.get('qr');

    // MENGGUNAKAN PNG HURUF BESAR SESUAI FILE ANDA
    const imgBg = new Image();
    imgBg.src = 'template.PNG'; 

    const imgQr = new Image();

    function render() {
        // Atur ukuran canvas sesuai gambar template
        canvas.width = imgBg.width;
        canvas.height = imgBg.height;
        
        // Gambar Background
        ctx.drawImage(imgBg, 0, 0);

        // Gambar QRIS dari Link (jika ada)
        if (qrBase64) {
            // Posisi QR: silakan sesuaikan angka ini jika letaknya kurang pas
            ctx.drawImage(imgQr, 53, 175, 560, 560); 
        }

        // Gambar Nominal
        if (nom) {
            const txt = new Intl.NumberFormat('id-ID', {
                style: 'currency', currency: 'IDR', minimumFractionDigits: 0
            }).format(nom);
            
            ctx.font = "bold 40px Arial"; // Ukuran font diperkecil sedikit agar pas
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            // Posisi teks nominal (X: tengah, Y: di area merah)
            ctx.fillText(txt, 604, 835); 
        }
    }

    imgBg.onload = () => {
        if (qrBase64) {
            // Dekode data QR dari link
            imgQr.src = "data:image/png;base64," + decodeURIComponent(qrBase64);
            imgQr.onload = render;
        } else {
            render();
        }
    };

    // Pastikan jika gambar gagal load (salah nama file), tetap ada info
    imgBg.onerror = () => {
        alert("Gagal memuat template. Pastikan file bernama template.PNG ada di GitHub.");
    };

    // LOGIKA TIMER 9 MENIT
    let timeLeft = 9 * 60;
    const countdown = setInterval(() => {
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById('timer').innerHTML = `Sisa Waktu: 0${m}:${s < 10 ? '0'+s : s}`;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            document.getElementById('content').innerHTML = "<h1 style='margin-top:100px; color:#ce2029;'>WAKTU HABIS</h1><p>Silakan minta link pembayaran baru kepada admin.</p>";
        }
        timeLeft--;
    }, 1000);
</script>
</body>
</html>
